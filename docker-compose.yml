version: "3.8"
services:
  traefik:
    image: traefik:3.0
    command:
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - "SSO_DOMAIN=${SSO_DOMAIN}"
      - "BFF_A_DOMAIN=${BFF_A_DOMAIN}"
      - "BFF_B_DOMAIN=${BFF_B_DOMAIN}"
    volumes:
      - "./traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - public
    restart: unless-stopped

  sso-hub:
    build:
      context: .
      dockerfile: ./packages/sso-server/Dockerfile
    env_file: ./config/sso-server.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/sso_hub
      REDIS_URL: redis://redis:6379
      COOKIE_SECURE: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/.well-known/openid-configuration"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./packages/sso-server/jwt-private.pem:/app/jwt-private.pem:ro
      - ./packages/sso-server/jwt-public.pem:/app/jwt-public.pem:ro
      - webdist:/app/public
    depends_on:
      web:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - public
      - internal
    restart: unless-stopped

  bff-a:
    build:
      context: .
      dockerfile: ./packages/bff/Dockerfile
    env_file: ./config/bff-app-a.env
    environment:
      SSO_URL: http://sso-hub:3000
      REDIS_URL: redis://redis:6379
      COOKIE_SECURE: "true"
    volumes:
      - webdist:/app/public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/me"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bffa.rule=Host(`${BFF_A_DOMAIN}`)"
      - "traefik.http.routers.bffa.entrypoints=websecure"
      - "traefik.http.routers.bffa.tls.certresolver=letsencrypt"
    depends_on:
      web:
        condition: service_completed_successfully
      sso-hub:
        condition: service_started
    networks:
      - public
      - internal
    restart: unless-stopped

  bff-b:
    build:
      context: .
      dockerfile: ./packages/bff/Dockerfile
    env_file: ./config/bff-app-b.env
    environment:
      SSO_URL: http://sso-hub:3000
      REDIS_URL: redis://redis:6379
      COOKIE_SECURE: "true"
    volumes:
      - webdist:/app/public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/me"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bffb.rule=Host(`${BFF_B_DOMAIN}`)"
      - "traefik.http.routers.bffb.entrypoints=websecure"
      - "traefik.http.routers.bffb.tls.certresolver=letsencrypt"
    depends_on:
      web:
        condition: service_completed_successfully
      sso-hub:
        condition: service_started
    networks:
      - public
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sso_hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    volumes:
      - webdist:/output
    command: ["cp", "-r", "/dist/.", "/output/"]

networks:
  public:
  internal:
    internal: true

volumes:
  pgdata:
  letsencrypt:
  webdist:
