version: "3.8"
services:
  traefik:
    image: traefik:3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - public
    restart: unless-stopped

  sso-hub:
    build:
      context: .
      dockerfile: ./packages/sso-server/Dockerfile
    env_file: ./config/sso-server.env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/sso_hub
      REDIS_URL: redis://redis:6379
      COOKIE_SECURE: "true"
    volumes:
      - ./packages/sso-server/jwt-private.pem:/app/jwt-private.pem:ro
      - ./packages/sso-server/jwt-public.pem:/app/jwt-public.pem:ro
      - webdist:/app/public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sso.rule=Host(`${SSO_DOMAIN}`)"
      - "traefik.http.routers.sso.entrypoints=websecure"
      - "traefik.http.routers.sso.tls.certresolver=letsencrypt"
    depends_on:
      web:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - public
      - internal
    restart: unless-stopped

  bff-a:
    build:
      context: .
      dockerfile: ./packages/bff/Dockerfile
    env_file: ./config/bff-app-a.env
    environment:
      SSO_URL: http://sso-hub:3000
      REDIS_URL: redis://redis:6379
      COOKIE_SECURE: "true"
    volumes:
      - webdist:/app/public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bffa.rule=Host(`${BFF_A_DOMAIN}`)"
      - "traefik.http.routers.bffa.entrypoints=websecure"
      - "traefik.http.routers.bffa.tls.certresolver=letsencrypt"
    depends_on:
      web:
        condition: service_completed_successfully
      sso-hub:
        condition: service_started
    networks:
      - public
      - internal
    restart: unless-stopped

  bff-b:
    build:
      context: .
      dockerfile: ./packages/bff/Dockerfile
    env_file: ./config/bff-app-b.env
    environment:
      SSO_URL: http://sso-hub:3000
      REDIS_URL: redis://redis:6379
      COOKIE_SECURE: "true"
    volumes:
      - webdist:/app/public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bffb.rule=Host(`${BFF_B_DOMAIN}`)"
      - "traefik.http.routers.bffb.entrypoints=websecure"
      - "traefik.http.routers.bffb.tls.certresolver=letsencrypt"
    depends_on:
      web:
        condition: service_completed_successfully
      sso-hub:
        condition: service_started
    networks:
      - public
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sso_hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    volumes:
      - webdist:/output
    command: ["cp", "-r", "/dist/.", "/output/"]

networks:
  public:
  internal:
    internal: true

volumes:
  pgdata:
  letsencrypt:
  webdist:
