version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: sso_password
      POSTGRES_DB: sso_hub
    ports:
      - "5432:5432"
    volumes:
      - pgdata_devfull:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sso"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    volumes:
      - webdist:/output
    command: ["cp", "-r", "/dist/.", "/output/"]

  sso-hub:
    build:
      context: .
      dockerfile: ./packages/sso-server/Dockerfile
    ports:
      - "3000:3000"
    # Note: sso env loading may change when web frontend mount is added
    env_file: ./packages/sso-server/.env
    environment:
      DATABASE_URL: postgresql://sso:sso_password@postgres:5432/sso_hub
      REDIS_URL: redis://redis:6379
    volumes:
      - ./packages/sso-server/jwt-private.pem:/app/jwt-private.pem:ro
      - ./packages/sso-server/jwt-public.pem:/app/jwt-public.pem:ro
      - webdist:/app/public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/.well-known/openid-configuration"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      web:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started

  bff-a:
    build:
      context: .
      dockerfile: ./packages/bff/Dockerfile
    ports:
      - "3001:3001"
    env_file: config/bff-app-a.env
    volumes:
      - webdist:/app/public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/me"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      web:
        condition: service_completed_successfully
      redis:
        condition: service_started
      sso-hub:
        condition: service_started

  bff-b:
    build:
      context: .
      dockerfile: ./packages/bff/Dockerfile
    ports:
      - "3002:3002"
    env_file: config/bff-app-b.env
    volumes:
      - webdist:/app/public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/me"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      web:
        condition: service_completed_successfully
      redis:
        condition: service_started
      sso-hub:
        condition: service_started

volumes:
  pgdata_devfull:
  webdist:
