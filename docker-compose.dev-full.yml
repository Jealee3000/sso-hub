version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: sso_password
      POSTGRES_DB: sso_hub
    ports:
      - "5432:5432"
    volumes:
      - pgdata_devfull:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  sso-hub:
    build: ./packages/sso-server
    ports:
      - "3000:3000"
    env_file: ./packages/sso-server/.env
    depends_on:
      - postgres
      - redis

  bff-a:
    build: ./packages/bff-a
    ports:
      - "3001:3001"
    env_file: ./packages/bff-a/.env
    depends_on:
      - redis

  bff-b:
    build: ./packages/bff-b
    ports:
      - "3002:3002"
    env_file: ./packages/bff-b/.env
    depends_on:
      - redis

volumes:
  pgdata_devfull:
