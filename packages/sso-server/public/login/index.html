<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSO Hub - 登录</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --text: #e2e8f0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh;
         background:var(--bg); color:var(--text); font-family:system-ui, sans-serif; }
  .card { background:var(--card); border-radius:16px; padding:48px 40px; width:100%; max-width:420px;
          text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.3); }
  h1 { font-size:28px; margin-bottom:4px; }
  .subtitle { color:#94a3b8; margin-bottom:32px; font-size:14px; }
  .btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
         padding:14px; border-radius:10px; border:none; cursor:pointer; font-size:15px;
         margin-bottom:12px; transition:all .2s; color:#fff; }
  .btn:hover { transform:translateY(-1px); }
  .btn-github { background:#24292e; }
  .btn-wallet { background:var(--primary); }
  .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:#64748b; font-size:13px; }
  .divider::before, .divider::after { content:''; flex:1; border-top:1px solid #334155; }
  .error { color:#ef4444; font-size:13px; margin-top:12px; display:none; }
</style>
</head>
<body>
<div class="card">
  <h1>SSO Hub</h1>
  <p class="subtitle">选择登录方式</p>

  <button class="btn btn-github" onclick="loginWithGithub()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
    GitHub 登录
  </button>

  <button class="btn btn-wallet" onclick="loginWithWallet()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M16 10h4v4h-4z"/></svg>
    Web3 钱包登录
  </button>

  <p class="error" id="error"></p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const clientId = params.get('client_id');

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function loginWithGithub() {
    const redirect = clientId
      ? `/login/github?redirect=${encodeURIComponent('/authorize?' + window.location.search.slice(1))}`
      : '/login/github';
    window.location.href = redirect;
  }

  async function loginWithWallet() {
    if (!window.ethereum) {
      showError('未检测到钱包，请安装 MetaMask');
      return;
    }
    try {
      const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
      const addr = accounts[0];
      const nonceRes = await fetch('/login/wallet/nonce', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wallet_address: addr }),
      });
      const { nonce } = await nonceRes.json();
      const msg = `Sign this message to log in to SSO Hub.\nNonce: ${nonce}`;
      const signature = await ethereum.request({ method: 'personal_sign', params: [msg, addr] });
      const verifyRes = await fetch('/login/wallet/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nonce, signature, wallet_address: addr }),
      });
      const { code } = await verifyRes.json();
      if (clientId) {
        const redirectUri = params.get('redirect_uri');
        window.location.href = `${redirectUri}?code=${code}&state=${params.get('state')||''}`;
      } else {
        document.querySelector('.card').innerHTML = '<h1>已登录</h1><p style="color:#94a3b8;">Auth Code: ' + code + '</p>';
      }
    } catch (err) {
      showError(err.message || '登录失败');
    }
  }
</script>
</body>
</html>
