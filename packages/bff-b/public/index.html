<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务 B</title>
<style>
  body { font-family:system-ui; background:#0f172a; color:#e2e8f0; display:flex;
         align-items:center; justify-content:center; min-height:100vh; text-align:center; margin:0; }
  .card { background:#1e293b; border-radius:16px; padding:40px; max-width:400px; width:100%; }
  a { color:#6366f1; text-decoration:none; }
  .logout { display:inline-block; margin-top:20px; padding:8px 24px; background:#ef4444;
            color:#fff; border-radius:8px; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <h1>业务 B</h1>
  <p>已认证 · BFF B 保护页面</p>
  <div id="user-info" style="margin:16px 0;color:#94a3b8;">加载中...</div>
  <a href="/logout" class="logout">登出</a>
</div>
<script>
  fetch('/api/me').then(r=>r.json()).then(u=>{
    document.getElementById('user-info').textContent = `你好, ${u.name || u.userId}`;
  });
</script>
</body>
</html>
